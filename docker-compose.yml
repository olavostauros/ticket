services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ticket
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d

  app:
    build: .
    ports:
      - "4321:4321"
    environment:
      - HOST=0.0.0.0
    env_file: ./.env.local
    depends_on:
      - db

volumes:
  pgdata: