version: "3.8"
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ticket
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./migrations/00001_initial_schema.sql:/docker-entrypoint-initdb.d/00001_initial_schema.sql

  app:
    build: .
    ports:
      - "4321:4321"
    env_file: ./.env.local
    depends_on:
      - db

volumes:
  pgdata: