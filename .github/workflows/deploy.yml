# ====================================================================
# Ticket — Deploy to Cloudflare Pages
# ====================================================================
# Runs on pushes to main: install deps, build, deploy to Cloudflare Pages.
#
# Required secrets (set in GitHub repository settings):
#   CLOUDFLARE_API_TOKEN  — Cloudflare API token with Pages write access
# ====================================================================

name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  # Allow manual trigger from GitHub Actions tab
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Run tests
        run: bun test
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY || 'placeholder' }}

      # Diagnostic: does not print secret value
      - name: Log CLOUDFLARE_API_TOKEN presence
        run: |
          if [ -z "${CLOUDFLARE_API_TOKEN}" ]; then
            echo "CLOUDFLARE_API_TOKEN: NOT SET"
          else
            echo "CLOUDFLARE_API_TOKEN: SET"
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Skip deploy — missing Cloudflare token
        if: env.CLOUDFLARE_API_TOKEN == ''
        run: |
          echo "Skipping deploy: CLOUDFLARE_API_TOKEN is not set."
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Build for Cloudflare
        run: |
          bunx astro build --config astro.config.cloudflare.ts
          bun run postbuild:cloudflare
        env:
          # These are needed at build time for env validation; actual
          # secrets are set via `npx wrangler secret put` in Cloudflare.
          DATABASE_URL: ${{ secrets.DATABASE_URL || 'postgresql://placeholder' }}
          JWT_SECRET: placeholder
          RESEND_API_KEY: placeholder
          PUBLIC_APP_URL: ${{ secrets.PUBLIC_APP_URL || 'https://ticket-bbm.pages.dev' }}

      - name: Deploy to Cloudflare Pages
        if: env.CLOUDFLARE_API_TOKEN != ''
        run: npx wrangler pages deploy dist/ --project-name ticket
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}